<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

background:white;

padding:35px;

width:380px;

border-radius:12px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

input{

width:100%;

padding:12px;

margin:15px 0;

}

button{

width:100%;

padding:12px;

background:#0b5ed7;

color:white;

border:none;

cursor:pointer;

}

p{

text-align:center;

margin-top:15px;

color:green;

}

</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<input
type="email"
id="email"
placeholder="Enter your email">

<button onclick="resetPassword()">

Send Reset Link

</button>

<p id="message"></p>

</div>

<script src="forgot-password.js"></script>

</body>

</html>
