<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sophia's Clinic Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

h1{
    color:#0b5ed7;
    margin-bottom:25px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card h3{
    color:#666;
    margin-bottom:10px;
}

.card p{
    font-size:30px;
    font-weight:bold;
    color:#0b5ed7;
}

.controls{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.controls input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    width:250px;
}

.controls button{
    padding:10px 20px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.controls button:hover{
    background:#084298;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#0b5ed7;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f8f9fa;
}

.status{
    padding:5px 12px;
    border-radius:20px;
    color:white;
    font-size:13px;
}

.pending{
    background:orange;
}

.completed{
    background:green;
}

.cancelled{
    background:red;
}

.action-btn{
    border:none;
    padding:7px 12px;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-right:5px;
}

.complete-btn{
    background:green;
}

.delete-btn{
    background:red;
}

@media(max-width:768px){

.dashboard{
grid-template-columns:1fr;
}

.controls{
flex-direction:column;
}

.controls input{
width:100%;
}

}

</style>

</head>

<body>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">

<h1>Sophia's Clinic Admin Dashboard</h1>

<button id="logoutBtn">

Logout

</button>

</div>

<div class="dashboard">

<div class="card">
<h3>Total Bookings</h3>
<p id="totalBookings">0</p>
</div>

<div class="card">
<h3>Today's Bookings</h3>
<p id="todayBookings">0</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">$0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingBookings">0</p>
</div>

</div>

<div class="controls">

<input
type="text"
id="search"
placeholder="Search customer...">

<input
type="date"
id="filterDate">

<button onclick="exportExcel()">
Export Excel
</button>

<button id="refreshBtn">
Refresh
</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>Name</th>

<th>Phone</th>

<th>Email</th>

<th>Service</th>

<th>Date</th>

<th>Time</th>

<th>Total</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="bookingTable">

</tbody>

</table>

</div>
<div id="bookingModal" style="display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);">

<div style="background:white;
width:500px;
max-width:90%;
margin:60px auto;
padding:25px;
border-radius:10px;">

<h2>Booking Details</h2>

<div id="bookingDetails"></div>

<br>

<button onclick="document.getElementById('bookingModal').style.display='none'">
Close
</button>

</div>

</div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="admin.js"></script>

</body>

</html>
