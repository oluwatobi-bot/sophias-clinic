<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sophia's Clinic Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:#fff;

width:380px;

padding:35px;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

h2{

text-align:center;

margin-bottom:25px;

color:#0b5ed7;

}

input{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:8px;

font-size:15px;

}

button{

width:100%;

padding:12px;

background:#0b5ed7;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#084298;

}

a{

display:block;

margin-top:15px;

text-align:center;

text-decoration:none;

}

#error{

margin-top:15px;

color:red;

text-align:center;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<a href="forgot-password.html">

Forgot Password?

</a>

<p id="error"></p>

</div>

<script src="login.js"></script>

</body>

</html>
